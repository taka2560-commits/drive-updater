<!-- @dsCard group="Colors" viewport="700x150" name="Heatmap scale" subtitle="カレンダー表示の活動量グラデーション" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 28px 24px; display: grid; gap: 18px; }
  .scale { display: flex; align-items: center; gap: 10px; }
  .label { font-size: 11px; color: var(--text-muted); width: 32px; }
  .cells { display: flex; gap: 4px; }
  .cell  { width: 22px; height: 22px; border-radius: 4px; }
  .caption { font-size: 11.5px; color: var(--text-secondary); }
</style>
</head>
<body data-theme="earth">
  <div class="scale">
    <span class="label">少</span>
    <div class="cells">
      <div class="cell" style="background:var(--heat-0)"></div>
      <div class="cell" style="background:var(--heat-1)"></div>
      <div class="cell" style="background:var(--heat-2)"></div>
      <div class="cell" style="background:var(--heat-3)"></div>
      <div class="cell" style="background:var(--heat-4)"></div>
    </div>
    <span class="label">多</span>
    <span class="caption">— Earth テーマ</span>
  </div>
  <div class="scale" data-theme="light" style="background:var(--bg-app); padding:8px 12px; border-radius:8px;">
    <span class="label">少</span>
    <div class="cells">
      <div class="cell" style="background:var(--heat-0)"></div>
      <div class="cell" style="background:var(--heat-1)"></div>
      <div class="cell" style="background:var(--heat-2)"></div>
      <div class="cell" style="background:var(--heat-3)"></div>
      <div class="cell" style="background:var(--heat-4)"></div>
    </div>
    <span class="label">多</span>
    <span class="caption">— Light テーマ</span>
  </div>
</body>
</html>
