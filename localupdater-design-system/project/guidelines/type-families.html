<!-- @dsCard group="Type" viewport="700x180" name="Type families" subtitle="Inter + Noto Sans JP + JetBrains Mono" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 20px 24px; display: grid; gap: 14px; }
  .row { display: grid; grid-template-columns: 110px 1fr 90px; align-items: baseline; gap: 16px; }
  .role { font-size: 11px; color: var(--text-muted); letter-spacing: .04em; text-transform: uppercase; }
  .sample { color: var(--text-primary); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); text-align: right; }
</style>
</head>
<body data-theme="earth">
  <div class="row">
    <span class="role">Sans (UI)</span>
    <span class="sample" style="font-family:var(--font-sans); font-size:18px;">Recent updates / 最近更新されたファイル</span>
    <span class="name">Inter + Noto Sans JP</span>
  </div>
  <div class="row">
    <span class="role">Display</span>
    <span class="sample" style="font-family:var(--font-display); font-weight:600; font-size:22px; letter-spacing:-.01em;">設定 — Settings</span>
    <span class="name">Inter 600</span>
  </div>
  <div class="row">
    <span class="role">Mono</span>
    <span class="sample" style="font-family:var(--font-mono); font-size:13px;">C:\Users\taka2\Dropbox\Desktop  ·  109 MB</span>
    <span class="name">JetBrains Mono</span>
  </div>
</body>
</html>
