<!-- @dsCard group="Spacing" viewport="700x150" name="Radii & shadows" subtitle="角丸とエレベーション" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 22px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .group h4 { font-size: 11px; color: var(--text-muted); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 12px; font-weight: 500; }
  .row { display: flex; align-items: flex-end; gap: 12px; }
  .box { background: var(--surface-elevated); width: 56px; height: 56px;
         display: flex; align-items: flex-end; justify-content: center;
         font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); padding-bottom: 4px; }
</style>
</head>
<body data-theme="earth">
  <div class="group">
    <h4>Corner radii</h4>
    <div class="row">
      <div class="box" style="border-radius: var(--radius-sm)">4</div>
      <div class="box" style="border-radius: var(--radius-md)">6</div>
      <div class="box" style="border-radius: var(--radius-lg)">8</div>
      <div class="box" style="border-radius: var(--radius-xl)">12</div>
      <div class="box" style="border-radius: var(--radius-2xl)">16</div>
    </div>
  </div>
  <div class="group">
    <h4>Elevation</h4>
    <div class="row">
      <div class="box" style="box-shadow: var(--shadow-sm); border-radius: 8px;">sm</div>
      <div class="box" style="box-shadow: var(--shadow-md); border-radius: 8px;">md</div>
      <div class="box" style="box-shadow: var(--shadow-lg); border-radius: 8px;">lg</div>
      <div class="box" style="box-shadow: var(--glow-accent); border-radius: 8px; color: var(--accent);">glow</div>
    </div>
  </div>
</body>
</html>
