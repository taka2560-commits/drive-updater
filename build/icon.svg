<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: rounded square, dark Earth surface -->
  <rect width="512" height="512" rx="112" fill="#222629"/>
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" fill-opacity="0.5"/>

  <!-- Folder body -->
  <g>
    <!-- Folder back tab -->
    <path d="M120 168 h80 l28 28 h164 a24 24 0 0 1 24 24 v8 H96 v-44 a24 24 0 0 1 24 -24 z" fill="#F5993D"/>
    <!-- Folder front -->
    <path d="M96 224 h320 a0 0 0 0 1 0 0 v140 a28 28 0 0 1 -28 28 H124 a28 28 0 0 1 -28 -28 z" fill="#FAB36B"/>
    <path d="M96 224 h320 v24 H96 z" fill="#F5993D" fill-opacity="0.35"/>
  </g>

  <!-- Update / refresh arrows badge, centered on folder -->
  <g transform="translate(256 312)">
    <circle r="62" fill="#222629" fill-opacity="0.18"/>
    <!-- circular refresh arrows -->
    <g stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" fill="none">
      <path d="M -38 -6 A 40 40 0 0 1 34 -20"/>
      <path d="M 38 6 A 40 40 0 0 1 -34 20"/>
    </g>
    <!-- arrow heads -->
    <path d="M 34 -20 l 6 -22 l -24 8 z" fill="#FFFFFF"/>
    <path d="M -34 20 l -6 22 l 24 -8 z" fill="#FFFFFF"/>
  </g>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#31658F" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#222629" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
