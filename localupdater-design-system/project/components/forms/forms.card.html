<!-- @dsCard group="Components" viewport="700x320" name="Forms" subtitle="Button / IconButton / Input / Chip" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { padding: 20px 24px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 14px; }
  .label { font-size: 10px; color: var(--text-muted); letter-spacing: .08em; text-transform: uppercase; width: 90px; flex-shrink: 0; }
</style>
</head>
<body data-theme="earth">
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, IconButton, Input, Chip } = window.LocalUpdaterDesignSystem_672f59;
    function App() {
      const [q, setQ] = React.useState("");
      return (
        <div>
          <div className="row">
            <span className="label">Button</span>
            <Button variant="primary" leftIcon="refresh">再スキャン</Button>
            <Button leftIcon="plus">フォルダを追加</Button>
            <Button variant="ghost" rightIcon="chevronDown">並び順</Button>
            <Button variant="danger" leftIcon="trash">削除</Button>
            <Button disabled>無効</Button>
          </div>
          <div className="row">
            <span className="label">Sizes</span>
            <Button size="sm" variant="primary">sm</Button>
            <Button size="md" variant="primary">md (既定)</Button>
            <Button size="lg" variant="primary">lg</Button>
          </div>
          <div className="row">
            <span className="label">IconButton</span>
            <IconButton icon="list" active title="リスト" />
            <IconButton icon="grid" title="グリッド" />
            <IconButton icon="calendar" title="カレンダー" />
            <IconButton icon="settings" title="設定" />
            <IconButton icon="refresh" variant="filled" title="再スキャン" />
          </div>
          <div className="row">
            <span className="label">Input</span>
            <Input leftIcon="search" placeholder="ファイル名で検索…" value={q} onChange={(e)=>setQ(e.target.value)} clearable style={{ width: 280 }} />
          </div>
          <div className="row">
            <span className="label">Chip</span>
            <Chip selected leftIcon="folder" count={35}>すべて</Chip>
            <Chip leftIcon="cad" count={12}>CAD</Chip>
            <Chip leftIcon="image" count={8}>画像</Chip>
            <Chip leftIcon="doc" count={6}>ドキュメント</Chip>
            <Chip leftIcon="pdf" count={4}>PDF</Chip>
            <Chip leftIcon="other" count={5}>その他</Chip>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
