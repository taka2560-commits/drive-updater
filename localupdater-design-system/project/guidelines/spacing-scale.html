<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px ベース — UI 密度に合わせて細かい" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 24px 24px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; gap: 6px; align-items: center; font-size: 10.5px; color: var(--text-muted); font-family: var(--font-mono); }
  .bar { background: var(--accent); height: 16px; border-radius: 3px; }
  .name { color: var(--text-secondary); font-size: 10px; }
</style>
</head>
<body data-theme="earth">
  <div class="row">
    <div class="item"><div class="bar" style="width:2px"></div>  <span>2</span><span class="name">space-1</span></div>
    <div class="item"><div class="bar" style="width:4px"></div>  <span>4</span><span class="name">space-2</span></div>
    <div class="item"><div class="bar" style="width:6px"></div>  <span>6</span><span class="name">space-3</span></div>
    <div class="item"><div class="bar" style="width:8px"></div>  <span>8</span><span class="name">space-4</span></div>
    <div class="item"><div class="bar" style="width:12px"></div> <span>12</span><span class="name">space-5</span></div>
    <div class="item"><div class="bar" style="width:16px"></div> <span>16</span><span class="name">space-6</span></div>
    <div class="item"><div class="bar" style="width:20px"></div> <span>20</span><span class="name">space-7</span></div>
    <div class="item"><div class="bar" style="width:24px"></div> <span>24</span><span class="name">space-8</span></div>
    <div class="item"><div class="bar" style="width:32px"></div> <span>32</span><span class="name">space-9</span></div>
    <div class="item"><div class="bar" style="width:40px"></div> <span>40</span><span class="name">space-10</span></div>
    <div class="item"><div class="bar" style="width:48px"></div> <span>48</span><span class="name">space-11</span></div>
    <div class="item"><div class="bar" style="width:64px"></div> <span>64</span><span class="name">space-12</span></div>
  </div>
</body>
</html>
