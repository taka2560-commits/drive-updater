<!-- @dsCard group="Type" viewport="700x220" name="Type scale" subtitle="UI 階層 — xs から 3xl" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 16px 24px; }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 6px 8px; vertical-align: baseline; }
  .role  { font-size: 11px; color: var(--text-muted); width: 90px; letter-spacing: .04em; }
  .size  { color: var(--text-primary); }
  .token { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); text-align: right; width: 140px; }
</style>
</head>
<body data-theme="earth">
  <table>
    <tr><td class="role">3xl</td>    <td class="size" style="font-size:32px; font-weight:600; letter-spacing:-.01em;">設定</td>           <td class="token">--text-3xl · 32px</td></tr>
    <tr><td class="role">2xl</td>    <td class="size" style="font-size:24px; font-weight:600;">最近更新されたファイル</td>     <td class="token">--text-2xl · 24px</td></tr>
    <tr><td class="role">xl</td>     <td class="size" style="font-size:20px; font-weight:600;">追加フォルダ</td>             <td class="token">--text-xl · 20px</td></tr>
    <tr><td class="role">lg</td>     <td class="size" style="font-size:16px;">テーマ — 3 モードから選択</td>            <td class="token">--text-lg · 16px</td></tr>
    <tr><td class="role">md</td>     <td class="size" style="font-size:14px;">ファイル名で検索…</td>                 <td class="token">--text-md · 14px</td></tr>
    <tr><td class="role">base</td>   <td class="size" style="font-size:13px;">フォルダ・デスクトップ</td>            <td class="token">--text-base · 13px</td></tr>
    <tr><td class="role">sm</td>     <td class="size" style="font-size:12px; color:var(--text-secondary);">サブフォルダも含めて再スキャン</td><td class="token">--text-sm · 12px</td></tr>
    <tr><td class="role">xs</td>     <td class="size" style="font-size:11px; color:var(--text-muted); letter-spacing:.04em;">監視中 · 35 件 · 109 MB</td><td class="token">--text-xs · 11px</td></tr>
  </table>
</body>
</html>
